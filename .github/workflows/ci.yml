name: fw-ci

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: fw-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - uses: chickensoft-games/setup-godot@v2.4.1
        with:
          version: 4.6.2
          use-dotnet: true
          include-templates: false
      - name: Test on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./tools/test.ps1
      - name: Test on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: bash ./tools/test.sh
